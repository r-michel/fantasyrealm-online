server {
    listen 80;
    server_name fantasyrealm-online.rmi-dev.tech;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fantasyrealm-online.rmi-dev.tech;

    root /var/www/public;
    index index.php;

    ssl_certificate /etc/letsencrypt/live/fantasyrealm-online.rmi-dev.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fantasyrealm-online.rmi-dev.tech/privkey.pem;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}